<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioBlood — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <style>
    /* ── Layout ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      padding: var(--space-5);
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      padding: 36px 40px 40px;
      box-shadow: var(--shadow-md);
    }

    /* ── Logo ── */
    .auth-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
      justify-content: center;
    }

    .auth-logo-icon {
      width: 48px;
      height: 48px;
      background: var(--crimson-100);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .auth-brand {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--crimson);
      margin: 0;
      line-height: 1;
    }

    .auth-brand-sub {
      font-size: var(--fs-xs);
      letter-spacing: 1.2px;
      color: var(--text-light);
      margin: 3px 0 0;
      font-weight: 600;
    }

    /* ── Tabs ── */
    .auth-tabs {
      display: flex;
      background: var(--surface-tint);
      border-radius: var(--radius-pill);
      padding: 4px;
      margin-bottom: var(--space-6);
      gap: 2px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: var(--radius-pill);
      font-size: var(--fs-sm);
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: background 150ms ease, color 150ms ease;
    }

    .auth-tab.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      box-shadow: var(--shadow-xs);
    }

    /* ── Error ── */
    .auth-error {
      background: var(--red-100);
      border: 1px solid var(--crimson-200);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: var(--fs-sm);
      color: var(--crimson);
      margin-bottom: var(--space-4);
    }

    /* ── Campos ── */
    .auth-field {
      margin-bottom: var(--space-4);
    }

    .auth-label {
      display: block;
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: var(--space-2);
    }

    .auth-input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0 var(--space-4);
      font-size: var(--fs-body);
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .auth-input:focus {
      border-color: var(--crimson-400);
      box-shadow: 0 0 0 3px var(--crimson-50);
    }

    .auth-input::placeholder { color: var(--text-light); }

    /* ── Botón primario ── */
    .auth-btn-primary {
      width: 100%;
      height: 46px;
      background: var(--crimson);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-size: var(--fs-body);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-top: var(--space-5);
      box-shadow: 0 4px 12px rgba(192,57,43,0.25);
      transition: background 150ms ease, transform 150ms ease;
    }

    .auth-btn-primary:hover:not(:disabled) {
      background: var(--crimson-600);
      transform: translateY(-1px);
    }

    .auth-btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* ── Divisor ── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-5) 0;
      color: var(--text-light);
      font-size: var(--fs-sm);
    }

    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Botón Google ── */
    .auth-btn-google {
      width: 100%;
      height: 46px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      font-size: var(--fs-body);
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      transition: background 150ms ease, border-color 150ms ease;
    }

    .auth-btn-google:hover {
      background: var(--surface-tint);
      border-color: var(--border-strong);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .auth-card {
        padding: 28px 24px 32px;
        border-radius: var(--radius-xl);
      }
    }
  </style>
</head>
<body data-page="login">

  <div id="login-root"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
